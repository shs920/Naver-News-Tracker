services:
  - type: web
    name: naver-news-crawler
    runtime: python
    plan: free
    rootDir: crawler
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: CRAWL_INTERVAL_SEC
        value: "120"
